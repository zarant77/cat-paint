<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Cat Paint" />
  <meta property="og:description"
    content="Primitive sprite editor for Little One, a tiny .kkrieger-inspired mobile game." />
  <meta property="og:image" content="https://paint.catemup.com/og-image.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://paint.catemup.com/" />
  <meta property="og:site_name" content="Cat Paint" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cat Paint" />
  <meta name="twitter:description"
    content="Primitive sprite editor for Little One, a tiny .kkrieger-inspired mobile game." />
  <meta name="twitter:image" content="https://paint.catemup.com/og-image.jpg" />

  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/src/styles/index.css" />

  <title>Cat Paint</title>
</head>

<body>
  <main class="app">
    <aside class="toolbar" aria-label="Sprite tools">
      <header class="toolbar-header">
        <h1>Cat Paint</h1>
      </header>

      <section class="toolbar-group" aria-label="Sprite settings">
        <input id="sprite-id-input" type="hidden" value="player" />

        <label>
          Canvas
          <input id="canvas-size-input" type="text" value="64x64"
            title="Canvas size: WIDTHxHEIGHT. Examples: 64x64, 128,128, 256 256." aria-label="Canvas size"
            spellcheck="false" />
        </label>
      </section>

      <section class="toolbar-group primitive-toolbar" aria-label="Primitive tools">
        <button class="tool-button" type="button" data-kind="rect" aria-label="Add rectangle">■</button>
        <button class="tool-button" type="button" data-kind="circle" aria-label="Add circle">●</button>
        <button class="tool-button" type="button" data-kind="triangle" aria-label="Add triangle">▲</button>
      </section>

      <section class="toolbar-group edit-tool-toolbar" aria-label="Edit tools">
        <button class="tool-button" type="button" data-kind="fill" aria-label="Fill primitive">▰</button>
        <button class="tool-button" type="button" data-kind="rotate" aria-label="Rotate selection">↻</button>
        <button class="tool-button" type="button" data-kind="scale" aria-label="Scale selection">⤢</button>
        <button id="flip-horizontal-button" type="button" aria-label="Flip horizontal">⇋</button>
        <button id="flip-vertical-button" type="button" aria-label="Flip vertical">⇅</button>
      </section>

      <section class="toolbar-group" aria-label="Primitive settings">
        <label class="inline-field color-field">
          Color
          <input id="color-input" type="color" value="#111111" title="Color swatch" aria-label="Color swatch" />
          <input id="color-hex-input" type="text" value="#111111ff" title="Color in #RRGGBBAA format. Alpha is 00–FF."
            aria-label="Color in #RRGGBBAA format" spellcheck="false" />
        </label>
      </section>

      <section class="toolbar-group selected-primitive-toolbar" aria-label="Selected primitive">
        <h2 id="selection-summary">Selected: none</h2>

        <h2>Layer</h2>

        <div class="button-row">
          <button id="send-to-back-button" type="button" aria-label="Send to back">⤓</button>
          <button id="send-backward-button" type="button" aria-label="Send backward">↓</button>
          <button id="bring-forward-button" type="button" aria-label="Bring forward">↑</button>
          <button id="bring-to-front-button" type="button" aria-label="Bring to front">⤒</button>
        </div>

        <div class="button-row edit-actions">
          <button id="group-button" type="button" aria-label="Group selected nodes">⊞</button>
          <button id="ungroup-button" type="button" aria-label="Ungroup selected group">⊟</button>
          <button id="copy-primitive-button" type="button" aria-label="Copy selected primitives">⧉</button>
          <button id="paste-primitive-button" type="button" aria-label="Paste primitives">▣</button>
          <button id="delete-primitive-button" type="button" aria-label="Delete selected primitives">⌫</button>
          <button id="undo-button" type="button" aria-label="Undo">↶</button>
          <button id="redo-button" type="button" aria-label="Redo">↷</button>
        </div>
      </section>

      <section class="toolbar-group action-toolbar export-actions" aria-label="Export actions">
        <button id="clear-button" type="button" title="Clear sprite" aria-label="Clear sprite">⌧</button>
        <button id="import-button" type="button" aria-label="Import sprite">↙</button>
        <button id="show-button" type="button" aria-label="Export sprite">⇱</button>
      </section>
    </aside>

    <section class="workspace" aria-label="Sprite canvas workspace">
      <canvas id="sprite-canvas"></canvas>
    </section>

    <aside class="primitives-panel" aria-label="Layer tree">
      <header class="primitives-panel-header">
        <h2>Layers</h2>
      </header>

      <ol id="primitive-list" class="primitive-list" role="listbox" aria-multiselectable="true"></ol>
    </aside>
  </main>

  <dialog id="import-dialog" class="import-dialog">
    <form method="dialog" class="import-dialog-panel">
      <header class="import-dialog-header">
        <h2>Import sprite file</h2>
      </header>

      <textarea id="import-input" spellcheck="false" aria-label="Cat Paint JSON or Little One sprite C file"></textarea>
      <p id="import-error" class="import-error" role="alert" hidden></p>

      <div class="import-dialog-actions">
        <button id="import-cancel-button" type="submit" value="cancel" title="Cancel import">Cancel</button>
        <button id="import-confirm-button" type="button" title="Import pasted sprite file">Import</button>
      </div>
    </form>
  </dialog>

  <dialog id="export-dialog" class="export-dialog">
    <form method="dialog" class="export-dialog-panel">
      <header class="export-dialog-header">
        <h2>Sprite export</h2>
        <button type="submit" title="Close" aria-label="Close">×</button>
      </header>

      <div class="export-tabs" role="tablist" aria-label="Export format">
        <button id="export-json-tab" class="is-active" type="button" role="tab" aria-selected="true" aria-controls="export-json-output">JSON</button>
        <button id="export-procedure-tab" type="button" role="tab" aria-selected="false" aria-controls="export-procedure-output">Procedure</button>
      </div>

      <textarea id="export-json-output" spellcheck="false" aria-label="Cat Paint JSON project format"></textarea>
      <textarea id="export-procedure-output" spellcheck="false" readonly aria-label="Little One sprite C file" hidden></textarea>
    </form>
  </dialog>

  <dialog id="clear-dialog" class="confirm-dialog">
    <form method="dialog" class="confirm-dialog-panel">
      <h2>Clear sprite?</h2>
      <p>This will remove all primitives from the current sprite.</p>
      <div class="confirm-dialog-actions">
        <button id="clear-cancel-button" type="submit" value="cancel" title="Cancel clear" autofocus>Cancel</button>
        <button id="clear-confirm-button" class="destructive-button" type="button" title="Clear sprite">Clear</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
